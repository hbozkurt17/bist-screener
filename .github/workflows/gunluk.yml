name: Günlük Screener (Pzt-Per 19:00)

on:
  schedule:
    - cron: '0 16 * * 1-4'  # Pzt-Per 16:00 UTC = 19:00 TR
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy requests
      - run: python screener_gunluk.py
      - name: Geçmişi kaydet
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gecmis_gunluk.json || true
          git diff --staged --quiet || git commit -m "gunluk gecmis $(date +'%Y-%m-%d')"
          git push || true
