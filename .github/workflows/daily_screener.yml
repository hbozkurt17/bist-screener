name: BIST Momentum Screener

on:
  schedule:
    # Haftalık: Her Cuma 16:00 UTC = 19:00 Türkiye
    - cron: '0 16 * * 5'
    # Günlük: Pzt-Per 16:00 UTC = 19:00 Türkiye (Cuma haftalık var)
    - cron: '0 16 * * 1-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: pip install yfinance pandas numpy requests

      - name: Günlük screener (Pzt-Per)
        if: github.event.schedule == '0 16 * * 1-4' || github.event_name == 'workflow_dispatch'
        run: python screener_gunluk.py

      - name: Haftalık screener (Cuma)
        if: github.event.schedule == '0 16 * * 5' || github.event_name == 'workflow_dispatch'
        run: python screener.py

      - name: Geçmiş dosyalarını kaydet
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gecmis.json gecmis_gunluk.json || true
          git diff --staged --quiet || git commit -m "gecmis guncellendi $(date +'%Y-%m-%d')"
          git push || true
