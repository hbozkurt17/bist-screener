name: BIST Momentum Screener

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: pip install yfinance pandas numpy requests

      - name: Screener çalıştır
        run: python screener.py

      - name: Geçmiş dosyasını kaydet
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gecmis.json || true
          git diff --staged --quiet || git commit -m "gecmis guncellendi $(date +'%Y-%m-%d')"
          git push || true
